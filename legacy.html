<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烘焙帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFBF7;
    --paper-deep:#F4F1E7;
    --ink:#1B1813;
    --ink-soft:#6B6455;
    --line:#E6E1D4;
    --yolk:#C98A12;        /* 蛋黃 */
    --yolk-soft:#F6EDD8;
    --card:#FFFFFF;
    --warn:#B4452C;
    --ok:#4A7040;
    --serif:'Noto Serif TC',serif;
    --sans:'Noto Sans TC',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--sans);font-size:15px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;color:inherit}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--yolk);outline-offset:2px}

  /* ================= layout ================= */
  .app{display:grid;grid-template-columns:272px minmax(0,1fr);min-height:100vh}

  /* ================= sidebar:帳本目錄 ================= */
  aside{
    background:var(--paper-deep);border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  .side-head{padding:22px 18px 14px;border-bottom:3px solid var(--ink)}
  .side-head h1{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:.06em}
  .side-head small{display:block;color:var(--ink-soft);font-size:12px;margin-top:2px}
  .side-search{padding:12px 14px 4px}
  .side-search input{
    width:100%;border:1px solid var(--line);border-radius:6px;
    background:var(--card);padding:7px 10px;font-size:13.5px;font-family:var(--sans);
  }
  .side-search input::placeholder{color:var(--ink-soft)}
  .side-list{flex:1;overflow-y:auto;padding:6px 0 12px}
  .cat{padding:14px 14px 4px}
  .cat-head{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:11.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-soft);
    border-bottom:1px solid var(--ink);padding:0 4px 4px;margin-bottom:4px;
  }
  .cat-head .count{font-family:var(--mono);font-weight:500;letter-spacing:0}
  .r-item{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:7px 10px 7px 12px;border-radius:6px;font-size:14px;
    border-left:3px solid transparent;
  }
  .r-item:hover{background:var(--yolk-soft)}
  .r-item.sel{
    background:var(--card);border-left-color:var(--yolk);
    font-weight:700;box-shadow:0 1px 0 var(--line),0 -1px 0 var(--line);
  }
  .r-item .cost{font-family:var(--mono);font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .r-item.sel .cost{color:var(--yolk)}
  .side-foot{border-top:1px solid var(--line);padding:10px 14px;display:flex;flex-direction:column;gap:8px}
  .side-foot .row{display:flex;gap:8px}
  .side-foot .row button{flex:1}
  .btn{
    background:var(--card);border:1px solid var(--line);border-radius:6px;
    padding:8px 12px;cursor:pointer;font-size:13.5px;font-weight:500;
  }
  .btn:hover{border-color:var(--yolk)}
  .btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:700}
  .btn.primary:hover{background:#3A342A}
  .btn.active{border-color:var(--ink);font-weight:700;background:var(--yolk-soft)}
  .btn.sm{padding:3px 10px;font-size:12.5px}
  .btn.danger{color:var(--warn)}
  .side-foot .sum{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);
    text-align:center;letter-spacing:.04em}
  .no-hit{padding:16px;color:var(--ink-soft);font-size:13px}

  /* 本機修改提示 */
  .editbar{
    background:var(--yolk-soft);border:1px solid var(--yolk);border-radius:8px;
    padding:8px 10px;font-size:12.5px;line-height:1.5;
  }
  .editbar b{color:var(--yolk)}
  .editbar .row{display:flex;gap:6px;margin-top:6px}
  .editbar .row button{flex:1}

  /* ================= main ================= */
  main{padding:26px 34px 80px;min-width:0}
  .d-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    border-bottom:3px solid var(--ink);padding-bottom:12px}
  .d-head h2{font-family:var(--serif);font-size:28px;font-weight:700}
  .chip{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--yolk);
    background:var(--yolk-soft);border-radius:99px;padding:2px 12px;white-space:nowrap}
  .d-head .note{color:var(--ink-soft);font-size:13px}
  .d-head .tools{margin-left:auto;display:flex;gap:8px}

  /* 儀表列 */
  .board{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));
    border:1px solid var(--line);border-radius:10px;background:var(--card);
    margin-top:18px;overflow:hidden;
  }
  .cell{padding:14px 16px 12px;border-left:1px solid var(--line)}
  .cell:first-child{border-left:none}
  .cell .n{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1.2}
  .cell .l{font-size:11.5px;color:var(--ink-soft);letter-spacing:.06em;margin-top:2px}
  .cell.hi .n{color:var(--yolk)}
  .cell .n.ok{color:var(--ok)}
  .cell .n.warn{color:var(--warn);font-size:15px;line-height:1.9}

  .d-body{display:grid;grid-template-columns:1.4fr 1fr;gap:32px;margin-top:26px}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--ink-soft);
     text-align:left;border-bottom:2px solid var(--ink);padding:6px 8px}
  td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  tr.total td{border-bottom:none;border-top:2px solid var(--ink);font-weight:700;padding-top:10px}
  tr.total td.num{color:var(--yolk)}
  .missing{color:var(--warn);font-weight:700}

  /* 台式營養標示(簽名元素) */
  .label{background:#fff;border:2.5px solid var(--ink);padding:12px 14px;max-width:340px}
  .label h4{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:.15em;
    border-bottom:8px solid var(--ink);padding-bottom:6px;margin-bottom:6px}
  .label .meta{font-size:13px;padding:2px 0;border-bottom:4px solid var(--ink);margin-bottom:4px}
  .label table{font-size:13.5px}
  .label td{padding:5px 0;border-bottom:1px solid var(--ink)}
  .label tr:last-child td{border-bottom:none}
  .label td.num{font-family:var(--mono)}
  .label .hd td{font-weight:700;border-bottom:2px solid var(--ink);font-size:12.5px}
  .label-caption{font-size:12px;color:var(--ink-soft);margin-top:8px;max-width:340px}

  /* 材料主檔 */
  #ingview .hint{color:var(--ink-soft);font-size:13px;margin:14px 0 16px}
  #ingview .headrow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    border-bottom:3px solid var(--ink);padding-bottom:12px}
  #ingview h2{font-family:var(--serif);font-size:28px;font-weight:700}
  #ingview .headrow .tools{margin-left:auto;display:flex;gap:8px}
  code{font-family:var(--mono);font-size:12.5px;background:var(--yolk-soft);
    padding:1px 5px;border-radius:4px}
  .tablewrap{overflow-x:auto}
  td.ops{white-space:nowrap}
  td.ops button{margin-left:4px}

  kbd{font-family:var(--mono);font-size:11px;border:1px solid var(--line);
    border-bottom-width:2px;border-radius:4px;padding:0 5px;background:var(--card)}
  .kbd-hint{font-size:12px;color:var(--ink-soft);margin-top:26px}

  /* ================= dialog 表單 ================= */
  dialog{
    border:2.5px solid var(--ink);background:var(--paper);color:var(--ink);
    padding:0;max-width:560px;width:calc(100vw - 32px);
    margin:auto;
  }
  dialog::backdrop{background:rgba(27,24,19,.45)}
  .dlg-head{font-family:var(--serif);font-size:19px;font-weight:700;letter-spacing:.1em;
    border-bottom:6px solid var(--ink);padding:14px 18px 10px}
  .dlg-body{padding:16px 18px;max-height:65vh;overflow-y:auto}
  .dlg-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;
    border-top:2px solid var(--ink)}
  .f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .f-grid .full{grid-column:1/-1}
  .field label{display:block;font-size:12px;font-weight:700;letter-spacing:.06em;
    color:var(--ink-soft);margin-bottom:3px}
  .field input,.field select{
    width:100%;border:1px solid var(--line);border-radius:6px;background:var(--card);
    padding:7px 10px;font-size:14px;font-family:var(--sans);
  }
  .field input[type=number]{font-family:var(--mono)}
  .f-sec{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-soft);
    border-bottom:1px solid var(--ink);padding-bottom:4px;margin:18px 0 10px}
  .item-row{display:grid;grid-template-columns:1fr 96px 32px;gap:8px;margin-bottom:8px}
  .item-row input{border:1px solid var(--line);border-radius:6px;background:var(--card);
    padding:6px 10px;font-size:14px;font-family:var(--sans)}
  .item-row input.g{font-family:var(--mono);text-align:right}
  .item-row .del{background:none;border:1px solid var(--line);border-radius:6px;
    cursor:pointer;color:var(--warn);font-weight:700}
  .item-row .del:hover{border-color:var(--warn)}

  /* ================= mobile ================= */
  @media(max-width:840px){
    .app{grid-template-columns:1fr}
    aside{position:static;height:auto;max-height:none}
    .side-list{max-height:44vh}
    main{padding:20px 16px 60px}
    .d-body{grid-template-columns:1fr}
    .kbd-hint{display:none}
    .f-grid{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
</style>
</head>
<body>
<div class="app">

  <!-- ============ 左側:帳本目錄 ============ -->
  <aside>
    <div class="side-head">
      <h1>烘焙帳本</h1>
      <small>配方 · 成本 · 營養,一頁看完</small>
    </div>
    <div class="side-search">
      <input id="q" type="search" placeholder="搜尋甜點…" aria-label="搜尋甜點"
             oninput="renderSide()">
    </div>
    <div class="side-list" id="sidelist"></div>
    <div class="side-foot">
      <div id="editbar-slot"></div>
      <div class="row">
        <button class="btn primary" onclick="editRecipe(null)">＋ 新增食譜</button>
        <button class="btn" id="btn-ings" onclick="toggleIngs()">材料主檔</button>
      </div>
      <div class="sum" id="sidesum"></div>
    </div>
  </aside>

  <!-- ============ 右側:儀表板 ============ -->
  <main>
    <section id="detail" aria-live="polite"></section>
    <section id="ingview" style="display:none"></section>
    <p class="kbd-hint">小技巧:<kbd>↑</kbd> <kbd>↓</kbd> 在清單中切換甜點,<kbd>/</kbd> 跳到搜尋。</p>
  </main>

</div>

<!-- ============ 編輯食譜 ============ -->
<dialog id="dlg-r">
  <form method="dialog" onsubmit="return saveRecipe(event)">
    <div class="dlg-head" id="dlg-r-title">編輯食譜</div>
    <div class="dlg-body">
      <div class="f-grid">
        <div class="field full"><label>甜點名稱</label>
          <input id="fr-name" required></div>
        <div class="field"><label>分類</label>
          <input id="fr-cat" list="cat-list" placeholder="例:蛋糕冷藏"></div>
        <div class="field"><label>份數(切幾份/做幾顆)</label>
          <input id="fr-servings" type="number" min="1" step="1" required></div>
        <div class="field"><label>售價/份(NT$,可空)</label>
          <input id="fr-price" type="number" min="0" step="0.5"></div>
        <div class="field"><label>備註(模具、烤溫…)</label>
          <input id="fr-note" placeholder="例:6吋模 · 170C 40M"></div>
      </div>
      <div class="f-sec">配方(材料 + 用量g)</div>
      <div id="fr-items"></div>
      <button type="button" class="btn sm" onclick="addItemRow('','')">＋ 加一項材料</button>
    </div>
    <div class="dlg-foot">
      <button type="button" class="btn" onclick="document.getElementById('dlg-r').close()">取消</button>
      <button class="btn primary" value="save">儲存</button>
    </div>
  </form>
</dialog>

<!-- ============ 編輯材料 ============ -->
<dialog id="dlg-i">
  <form method="dialog" onsubmit="return saveIng(event)">
    <div class="dlg-head" id="dlg-i-title">編輯材料</div>
    <div class="dlg-body">
      <div class="f-grid">
        <div class="field full"><label>材料名稱</label>
          <input id="fi-name" required></div>
        <div class="field"><label>採購價(NT$)</label>
          <input id="fi-price" type="number" min="0" step="0.1" required></div>
        <div class="field"><label>採購重量(g)</label>
          <input id="fi-grams" type="number" min="0.1" step="0.1" required></div>
      </div>
      <div class="f-sec">每 100g 營養成分</div>
      <div class="f-grid">
        <div class="field"><label>熱量(大卡)</label>
          <input id="fi-kcal" type="number" min="0" step="0.1" value="0"></div>
        <div class="field"><label>蛋白質(g)</label>
          <input id="fi-protein" type="number" min="0" step="0.01" value="0"></div>
        <div class="field"><label>脂肪(g)</label>
          <input id="fi-fat" type="number" min="0" step="0.01" value="0"></div>
        <div class="field"><label>碳水化合物(g)</label>
          <input id="fi-carbs" type="number" min="0" step="0.01" value="0"></div>
        <div class="field"><label>糖(g)</label>
          <input id="fi-sugar" type="number" min="0" step="0.01" value="0"></div>
      </div>
    </div>
    <div class="dlg-foot">
      <button type="button" class="btn" onclick="document.getElementById('dlg-i').close()">取消</button>
      <button class="btn primary" value="save">儲存</button>
    </div>
  </form>
</dialog>

<datalist id="cat-list"></datalist>
<datalist id="ing-list"></datalist>

<script src="data/ingredients.js"></script>
<script src="data/recipes.js"></script>
<script>
const fmt  = (n,d=0)=> n.toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const NUTR = [["kcal","熱量","大卡",0],["protein","蛋白質","公克",1],
              ["fat","脂肪","公克",1],["carbs","碳水化合物","公克",1],["sugar","糖","公克",1]];
const CAT_ORDER = ["蛋糕冷藏","餅乾常溫","醬料","未分類"];

/* ================= 本機編輯層(localStorage) =================
   原始資料在 data/*.js;所有增刪改存 edits,兩層合併成 ING / RCP。
   edits.ingredients[名稱] = 物件(新增/覆蓋)或 null(刪除)
   edits.recipes[名稱]     = 物件或 null                        */
const LS_KEY='bakery-edits-v1';
let edits;
try{ edits = JSON.parse(localStorage.getItem(LS_KEY)) || {ingredients:{},recipes:{}}; }
catch(e){ edits = {ingredients:{},recipes:{}}; }
edits.ingredients = edits.ingredients||{}; edits.recipes = edits.recipes||{};
function persist(){ localStorage.setItem(LS_KEY, JSON.stringify(edits)); }
function editCount(){ return Object.keys(edits.ingredients).length + Object.keys(edits.recipes).length; }

/* 資料來源:優先 Google Sheet,失敗用內建 data/*.js */
const SHEET_ID='1CT2G8P8Gjd4hdAPMnvvxv15--BBlfp_RytVrw3Xr6VM';
/* Apps Script Web App 網址(部署後填入,結尾 /exec);空字串 = 純本機編輯模式 */
const SCRIPT_URL='';
const SYNC_TOKEN='bakery-7f3a';
let BASE={ing:INGREDIENTS, rcp:RECIPES};
let dataSource='內建檔案';

let ING={}, RCP=[];
function rebuild(){
  ING={};
  for(const n of Object.keys(BASE.ing)) if(!(n in edits.ingredients)) ING[n]=BASE.ing[n];
  for(const [n,v] of Object.entries(edits.ingredients)) if(v) ING[n]=v;
  RCP=[];
  for(const r of BASE.rcp){
    if(r.name in edits.recipes){ const e=edits.recipes[r.name]; if(e) RCP.push(e); }
    else RCP.push(r);
  }
  const baseNames=new Set(BASE.rcp.map(r=>r.name));
  for(const [n,v] of Object.entries(edits.recipes)) if(v && !baseNames.has(n)) RCP.push(v);
  // datalists
  document.getElementById('cat-list').innerHTML =
    [...new Set(RCP.map(r=>r.category).filter(Boolean))].map(c=>`<option value="${c}">`).join('');
  document.getElementById('ing-list').innerHTML =
    Object.keys(ING).map(n=>`<option value="${esc(n)}">`).join('');
}
const esc = s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

/* ---- 核心計算:一道食譜 → 成本 + 營養 ---- */
function calc(recipe){
  const rows=[]; let cost=0;
  const tot={kcal:0,protein:0,fat:0,carbs:0,sugar:0}; let grams=0, missing=[];
  for(const [name,g] of recipe.items){
    const ing=ING[name];
    if(!ing){ missing.push(name); rows.push({name,g,missing:true}); continue; }
    const c = g * ing.packPrice / ing.packGrams;
    cost += c; grams += g;
    const n={};
    for(const [k] of NUTR){ n[k]=ing.per100g[k]*g/100; tot[k]+=n[k]; }
    rows.push({name,g,cost:c,n});
  }
  return {rows,cost,tot,grams,missing};
}

/* ================= 側欄 ================= */
let selected = 0;               // RCP index
let ingsMode = false;

function groups(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  const g={};
  RCP.forEach((r,i)=>{
    if(q && !r.name.toLowerCase().includes(q)) return;
    (g[r.category||'未分類']=g[r.category||'未分類']||[]).push(i);
  });
  const cats=Object.keys(g).sort((a,b)=>{
    const ia=CAT_ORDER.indexOf(a), ib=CAT_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  return {g,cats};
}

function renderSide(){
  const {g,cats}=groups();
  const el=document.getElementById('sidelist');
  if(!cats.length){ el.innerHTML='<p class="no-hit">找不到符合的甜點。</p>'; }
  else el.innerHTML=cats.map(cat=>`
    <div class="cat">
      <div class="cat-head"><span>${esc(cat)}</span><span class="count">${g[cat].length}</span></div>
      ${g[cat].map(i=>{
        const r=RCP[i], c=calc(r);
        return `<button class="r-item ${i===selected&&!ingsMode?'sel':''}" id="ri-${i}"
                  onclick="showRecipe(${i})" aria-current="${i===selected&&!ingsMode}">
          <span>${esc(r.name)}</span>
          <span class="cost">$${fmt(c.cost/(r.servings||1),1)}/份</span>
        </button>`;
      }).join('')}
    </div>`).join('');
  document.getElementById('sidesum').textContent =
    `${RCP.length} 道甜點 · ${Object.keys(ING).length} 種材料 · 資料:${dataSource}`;
  // 同步 / 本機修改提示
  const n=editCount();
  let bar='';
  if(SCRIPT_URL){
    bar=`<div class="editbar">雲端同步:<b>${syncStat}</b>${n?` · 待同步 ${n} 筆`:''}
      <div class="row">
        <button class="btn sm" onclick="pushToSheet()">⇪ 寫入 Google Sheet</button>
        ${n?`<button class="btn sm danger" onclick="resetEdits()">還原</button>`:''}
      </div>
    </div>`;
  }else if(n){
    bar=`<div class="editbar">本機有 <b>${n}</b> 筆修改(只存在這台瀏覽器)。要永久保存:匯出資料檔,替換 repo 的 <code>data/</code> 再 push。
      <div class="row">
        <button class="btn sm" onclick="exportFiles()">匯出資料檔</button>
        <button class="btn sm danger" onclick="resetEdits()">全部還原</button>
      </div>
    </div>`;
  }
  document.getElementById('editbar-slot').innerHTML = bar;
}

/* ================= 主面板:甜點儀表板 ================= */
function showRecipe(i, scroll=true){
  selected=i; ingsMode=false;
  document.getElementById('ingview').style.display='none';
  document.getElementById('btn-ings').classList.remove('active');
  const detail=document.getElementById('detail');
  detail.style.display='block';

  const r=RCP[i]; if(!r){ detail.innerHTML='<p class="no-hit">請從左側選一道甜點,或按「＋ 新增食譜」。</p>'; renderSide(); return; }
  const c=calc(r), s=r.servings||1;
  const per=c.cost/s;
  const hasPrice = r.price!=null && r.price>0;
  const profit  = hasPrice ? r.price-per : null;
  const margin  = hasPrice ? (r.price-per)/per*100 : null;

  const boardCells = [
    `<div class="cell hi"><div class="n">$${fmt(per,1)}</div><div class="l">成本/份(共 $${fmt(c.cost,0)})</div></div>`,
    hasPrice
      ? `<div class="cell"><div class="n">$${fmt(r.price)}</div><div class="l">售價/份</div></div>`
      : `<div class="cell"><div class="n warn">未定價</div><div class="l">售價/份</div></div>`,
    hasPrice
      ? `<div class="cell"><div class="n ${profit>=0?'ok':'warn'}">$${fmt(profit,1)}</div><div class="l">利潤/份</div></div>`
      : `<div class="cell"><div class="n">—</div><div class="l">利潤/份</div></div>`,
    hasPrice
      ? `<div class="cell"><div class="n ${margin>=0?'ok':'warn'}">${fmt(margin)}%</div><div class="l">利潤率(利潤÷成本)</div></div>`
      : `<div class="cell"><div class="n">—</div><div class="l">利潤率</div></div>`,
    `<div class="cell"><div class="n">${fmt(c.tot.kcal/s)}</div><div class="l">大卡/份</div></div>`,
    `<div class="cell"><div class="n">${fmt(c.grams/s)}</div><div class="l">每份約 g</div></div>`
  ].join('');

  const rowsHtml=c.rows.map(row=> row.missing
    ? `<tr><td class="missing">${esc(row.name)}(材料主檔找不到)</td><td class="num">${fmt(row.g)}</td><td class="num">—</td><td class="num">—</td></tr>`
    : `<tr><td>${esc(row.name)}</td><td class="num">${fmt(row.g)}</td><td class="num">$${fmt(row.cost,1)}</td><td class="num">${fmt(row.n.kcal)}</td></tr>`
  ).join('');

  const labelRows=NUTR.map(([k,zh,unit,d])=>`
    <tr><td>${zh}</td>
        <td class="num">${fmt(c.tot[k]/s,d)} ${unit==='大卡'?'大卡':'公克'}</td>
        <td class="num">${fmt(c.tot[k]*100/Math.max(c.grams,1),d)} ${unit==='大卡'?'大卡':'公克'}</td></tr>`).join('');

  detail.innerHTML=`
    <div class="d-head">
      <h2>${esc(r.name)}</h2>
      <span class="chip">${esc(r.category||'未分類')}</span>
      ${r.note?`<span class="note">${esc(r.note)}</span>`:''}
      <span class="tools">
        <button class="btn sm" onclick="editRecipe(selected)">編輯</button>
        <button class="btn sm danger" onclick="deleteRecipe(selected)">刪除</button>
      </span>
    </div>
    <div class="board">${boardCells}</div>
    <div class="d-body">
      <div>
        <table>
          <thead><tr><th>材料</th><th class="num">用量 g</th><th class="num">成本</th><th class="num">熱量</th></tr></thead>
          <tbody>${rowsHtml}
            <tr class="total"><td>合計(${fmt(c.grams)} g)</td><td></td>
              <td class="num">$${fmt(c.cost,0)}</td><td class="num">${fmt(c.tot.kcal)}</td></tr>
          </tbody>
        </table>
      </div>
      <div>
        <div class="label">
          <h4>營養標示</h4>
          <div class="meta">本品每份 ${fmt(c.grams/s)} 公克 · 本包裝含 ${s} 份</div>
          <table>
            <tr class="hd"><td></td><td class="num">每份</td><td class="num">每100公克</td></tr>
            ${labelRows}
          </table>
        </div>
        <p class="label-caption">依材料主檔數值估算,實際熱量會因烘焙水分蒸發而每 100g 略高。</p>
      </div>
    </div>`;
  renderSide();
  if(scroll && window.innerWidth<=840) detail.scrollIntoView();
}

/* ================= 材料主檔 ================= */
function toggleIngs(){
  ingsMode=!ingsMode;
  document.getElementById('btn-ings').classList.toggle('active',ingsMode);
  document.getElementById('detail').style.display = ingsMode?'none':'block';
  document.getElementById('ingview').style.display = ingsMode?'block':'none';
  if(ingsMode) renderIngs(); else showRecipe(selected,false);
  renderSide();
}
let _ingNames=[];
function renderIngs(){
  _ingNames=Object.keys(ING);
  document.getElementById('ingview').innerHTML=`
    <div class="headrow">
      <h2>材料主檔</h2>
      <span class="tools"><button class="btn sm primary" onclick="editIng(null)">＋ 新增材料</button></span>
    </div>
    <p class="hint">共 ${_ingNames.length} 種材料。點「編輯」直接改價格與營養,改完所有食譜自動重算。</p>
    <div class="tablewrap">
    <table>
      <thead><tr><th>材料</th><th class="num">採購價</th><th class="num">採購量 g</th>
        <th class="num">$/100g</th><th class="num">大卡/100g</th><th class="num">蛋白質</th>
        <th class="num">脂肪</th><th class="num">碳水</th><th class="num">糖</th><th>操作</th></tr></thead>
      <tbody>${_ingNames.map((n,idx)=>{const i=ING[n],p=i.per100g;return `
        <tr><td>${esc(n)}</td><td class="num">$${fmt(i.packPrice)}</td><td class="num">${fmt(i.packGrams)}</td>
        <td class="num">$${fmt(i.packPrice*100/i.packGrams,1)}</td>
        <td class="num">${fmt(p.kcal)}</td><td class="num">${fmt(p.protein,1)}</td>
        <td class="num">${fmt(p.fat,1)}</td><td class="num">${fmt(p.carbs,1)}</td><td class="num">${fmt(p.sugar,1)}</td>
        <td class="ops"><button class="btn sm" onclick="editIng(_ingNames[${idx}])">編輯</button><button class="btn sm danger" onclick="deleteIng(_ingNames[${idx}])">刪除</button></td></tr>`}).join('')}
      </tbody>
    </table>
    </div>`;
}

/* ================= 編輯:食譜 ================= */
let editingRecipe=null;   // 原名稱;null = 新增
function addItemRow(name,g){
  const div=document.createElement('div');
  div.className='item-row';
  div.innerHTML=`<input list="ing-list" placeholder="材料名稱" value="${esc(name)}">
    <input class="g" type="number" min="0" step="0.1" placeholder="g" value="${g}">
    <button type="button" class="del" title="移除" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('fr-items').appendChild(div);
}
function editRecipe(i){
  const r = i==null ? null : RCP[i];
  editingRecipe = r ? r.name : null;
  document.getElementById('dlg-r-title').textContent = r ? `編輯:${r.name}` : '新增食譜';
  document.getElementById('fr-name').value = r?r.name:'';
  document.getElementById('fr-cat').value = r?(r.category||''):'';
  document.getElementById('fr-servings').value = r?r.servings:8;
  document.getElementById('fr-price').value = r&&r.price!=null?r.price:'';
  document.getElementById('fr-note').value = r?(r.note||''):'';
  document.getElementById('fr-items').innerHTML='';
  (r?r.items:[['',''],['','']]).forEach(([n,g])=>addItemRow(n,g));
  document.getElementById('dlg-r').showModal();
}
function saveRecipe(e){
  e.preventDefault();
  const name=document.getElementById('fr-name').value.trim();
  if(!name) return false;
  const items=[...document.querySelectorAll('#fr-items .item-row')].map(row=>{
    const [ni,gi]=row.querySelectorAll('input');
    const n=ni.value.trim(), g=parseFloat(gi.value);
    return n && g>0 ? [n,g] : null;
  }).filter(Boolean);
  if(!items.length){ alert('至少填一項材料與用量。'); return false; }
  const priceRaw=document.getElementById('fr-price').value;
  const obj={
    name,
    servings: Math.max(1, parseInt(document.getElementById('fr-servings').value)||1),
    category: document.getElementById('fr-cat').value.trim()||'未分類',
    price: priceRaw===''?null:parseFloat(priceRaw),
    note: document.getElementById('fr-note').value.trim(),
    items
  };
  if(editingRecipe && editingRecipe!==name) edits.recipes[editingRecipe]=null; // 改名 = 舊的刪掉
  edits.recipes[name]=obj;
  persist(); rebuild();
  document.getElementById('dlg-r').close();
  showRecipe(RCP.findIndex(x=>x.name===name), false);
  return false;
}
function deleteRecipe(i){
  const r=RCP[i]; if(!r) return;
  if(!confirm(`刪除「${r.name}」?(可用「全部還原」找回原始資料)`)) return;
  edits.recipes[r.name]=null;
  persist(); rebuild();
  showRecipe(Math.max(0,Math.min(selected,RCP.length-1)), false);
}

/* ================= 編輯:材料 ================= */
let editingIng=null;
function editIng(name){
  const ing = name ? ING[name] : null;
  editingIng = name;
  document.getElementById('dlg-i-title').textContent = ing ? `編輯:${name}` : '新增材料';
  document.getElementById('fi-name').value = name||'';
  document.getElementById('fi-price').value = ing?ing.packPrice:'';
  document.getElementById('fi-grams').value = ing?ing.packGrams:'';
  for(const k of ['kcal','protein','fat','carbs','sugar'])
    document.getElementById('fi-'+k).value = ing?ing.per100g[k]:0;
  document.getElementById('dlg-i').showModal();
}
function saveIng(e){
  e.preventDefault();
  const name=document.getElementById('fi-name').value.trim();
  if(!name) return false;
  const v=id=>parseFloat(document.getElementById(id).value)||0;
  const obj={
    packPrice:v('fi-price'), packGrams:Math.max(0.1,v('fi-grams')),
    per100g:{kcal:v('fi-kcal'),protein:v('fi-protein'),fat:v('fi-fat'),
             carbs:v('fi-carbs'),sugar:v('fi-sugar')}
  };
  if(editingIng && editingIng!==name) edits.ingredients[editingIng]=null;
  edits.ingredients[name]=obj;
  persist(); rebuild();
  document.getElementById('dlg-i').close();
  if(ingsMode) renderIngs();
  showAfterDataChange();
  return false;
}
function deleteIng(name){
  const used=RCP.filter(r=>r.items.some(([n])=>n===name)).map(r=>r.name);
  const msg = used.length
    ? `「${name}」被 ${used.length} 道食譜使用(${used.slice(0,5).join('、')}${used.length>5?'…':''}),刪除後這些食譜會顯示缺料。確定刪除?`
    : `刪除「${name}」?`;
  if(!confirm(msg)) return;
  edits.ingredients[name]=null;
  persist(); rebuild();
  if(ingsMode) renderIngs();
  showAfterDataChange();
}
function showAfterDataChange(){
  if(!ingsMode) showRecipe(Math.max(0,Math.min(selected,RCP.length-1)), false);
  else renderSide();
}

/* ================= 雲端同步(Apps Script) =================
   任何儲存/刪除後 1.5 秒自動把「目前完整資料」寫回 Google Sheet;
   成功後本機修改歸零(資料已進 Sheet)。失敗保留在 localStorage。 */
let syncStat='待命', syncTimer=null;
function scheduleSync(){
  if(!SCRIPT_URL) return;
  clearTimeout(syncTimer);
  syncStat='等待寫入…';
  syncTimer=setTimeout(pushToSheet,1500);
}
async function pushToSheet(){
  if(!SCRIPT_URL){ alert('尚未設定 Apps Script 網址:部署 google-apps-script.gs 後,把 /exec 網址填入 index.html 的 SCRIPT_URL。'); return; }
  clearTimeout(syncTimer);
  syncStat='寫入中…'; renderSide();
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',
      body:JSON.stringify({token:SYNC_TOKEN,ingredients:ING,recipes:RCP})});
    const j=await res.json();
    if(!j.ok) throw new Error(j.error||'寫入失敗');
    BASE={ing:JSON.parse(JSON.stringify(ING)), rcp:JSON.parse(JSON.stringify(RCP))};
    edits={ingredients:{},recipes:{}}; persist();
    dataSource='Google Sheet ✓';
    syncStat='已寫入 ✓ '+new Date().toLocaleTimeString('zh-TW',{hour12:false});
    rebuild();
  }catch(err){
    syncStat='失敗:'+err.message+'(修改已存本機)';
  }
  if(ingsMode) renderIngs();
  renderSide();
}

/* ================= 匯出 / 還原 ================= */
function jsN(v){ return Number.isFinite(v) ? String(+(+v).toFixed(4)) : '0'; }
function download(fname, text){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/javascript;charset=utf-8'}));
  a.download=fname; a.click(); URL.revokeObjectURL(a.href);
}
function exportFiles(){
  const d=new Date().toISOString().slice(0,10);
  let ing='// 材料主檔 — 由烘焙帳本網頁匯出 '+d+'\n\nconst INGREDIENTS = {\n';
  ing+=Object.entries(ING).map(([n,i])=>
    `  "${n}": {\n    packPrice: ${jsN(i.packPrice)}, packGrams: ${jsN(i.packGrams)},\n`+
    `    per100g: { kcal: ${jsN(i.per100g.kcal)}, protein: ${jsN(i.per100g.protein)}, fat: ${jsN(i.per100g.fat)}, carbs: ${jsN(i.per100g.carbs)}, sugar: ${jsN(i.per100g.sugar)} }\n  }`
  ).join(',\n');
  ing+='\n};\n';
  let rec='// 甜點食譜 — 由烘焙帳本網頁匯出 '+d+'\n\nconst RECIPES = [\n';
  rec+=RCP.map(r=>
    `  {\n    name: "${r.name}",\n    servings: ${r.servings},\n    category: "${r.category||'未分類'}",\n`+
    `    price: ${r.price==null?'null':jsN(r.price)},\n    note: "${(r.note||'').replace(/"/g,'\\"')}",\n`+
    `    items: [\n${r.items.map(([n,g])=>`      ["${n}", ${jsN(g)}]`).join(',\n')}\n    ]\n  }`
  ).join(',\n');
  rec+='\n];\n';
  download('ingredients.js', ing);
  download('recipes.js', rec);
  alert('已下載 ingredients.js 與 recipes.js。\n把兩個檔案放進 repo 的 data/ 資料夾(覆蓋舊檔)commit + push,GitHub Pages 就會永久更新;之後可按「全部還原」清掉本機修改。');
}
function resetEdits(){
  if(!confirm(`清除全部 ${editCount()} 筆本機修改,回到 data/ 檔案的原始資料?`)) return;
  edits={ingredients:{},recipes:{}};
  persist(); rebuild();
  selected=0;
  if(ingsMode) renderIngs();
  showAfterDataChange();
  renderSide();
}

/* ================= 鍵盤操作 ================= */
document.addEventListener('keydown',e=>{
  if(document.querySelector('dialog[open]')) return;
  if(e.target.tagName==='INPUT'){
    if(e.key==='Escape'){e.target.value='';renderSide();e.target.blur();}
    return;
  }
  if(e.key==='/'){e.preventDefault();document.getElementById('q').focus();return;}
  if(e.key!=='ArrowDown'&&e.key!=='ArrowUp') return;
  const {g,cats}=groups();
  const flat=cats.flatMap(c=>g[c]);
  if(!flat.length) return;
  e.preventDefault();
  const pos=flat.indexOf(selected);
  const next=e.key==='ArrowDown'
    ? flat[Math.min(pos+1,flat.length-1)]
    : flat[Math.max(pos-1,0)];
  showRecipe(next);
  const el=document.getElementById('ri-'+next);
  if(el) el.scrollIntoView({block:'nearest'});
});

/* ================= Google Sheet 載入 ================= */
function parseCSV(text){
  const rows=[]; let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; }
      else cell+=ch;
    }else if(ch==='"') inQ=true;
    else if(ch===','){ row.push(cell); cell=''; }
    else if(ch==='\n'){ row.push(cell); cell=''; if(row.some(c=>c!=='')) rows.push(row); row=[]; }
    else if(ch!=='\r') cell+=ch;
  }
  row.push(cell); if(row.some(c=>c!=='')) rows.push(row);
  return rows;
}
async function loadFromSheet(){
  const url=s=>`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(s)}`;
  const [mRes,rRes]=await Promise.all([fetch(url('材料')),fetch(url('食譜'))]);
  if(!mRes.ok||!rRes.ok) throw new Error('sheet fetch '+mRes.status+'/'+rRes.status);
  const num=v=>{const f=parseFloat(String(v).replace(/,/g,'')); return Number.isFinite(f)?f:0;};
  const ing={};
  for(const r of parseCSV(await mRes.text()).slice(1)){
    const name=(r[0]||'').trim(); if(!name) continue;
    ing[name]={packPrice:num(r[1]), packGrams:num(r[2])||100,
      per100g:{kcal:num(r[3]),protein:num(r[4]),fat:num(r[5]),carbs:num(r[6]),sugar:num(r[7])}};
  }
  const map=new Map();
  for(const r of parseCSV(await rRes.text()).slice(1)){
    const name=(r[0]||'').trim(), mat=(r[5]||'').trim(), g=num(r[6]);
    if(!name||!mat||!(g>0)) continue;
    if(!map.has(name)) map.set(name,{
      name, servings:Math.max(1,Math.round(num(r[1]))||1),
      category:(r[2]||'').trim()||'未分類',
      price:String(r[3]).trim()===''?null:num(r[3]),
      note:(r[4]||'').trim(), items:[]});
    map.get(name).items.push([mat,g]);
  }
  if(!Object.keys(ing).length||!map.size) throw new Error('sheet empty');
  BASE={ing, rcp:[...map.values()]};
  dataSource='Google Sheet ✓';
}

/* ================= 啟動 ================= */
function firstShow(){
  rebuild();
  renderSide();
  const {g,cats}=groups();
  showRecipe(cats.length ? g[cats[0]][0] : 0, false);
}
firstShow();                       // 先用內建資料立即顯示
loadFromSheet().then(()=>{         // Sheet 抓到後無縫換上
  const keep=RCP[selected]&&RCP[selected].name;
  rebuild();
  const idx=RCP.findIndex(r=>r.name===keep);
  selected=idx>=0?idx:0;
  if(ingsMode) renderIngs();
  renderSide();
  if(!ingsMode) showRecipe(selected,false);
}).catch(err=>{
  console.warn('Google Sheet 讀取失敗,使用內建資料:',err.message);
});
